<!doctype html>
<html lang="ko">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IGIS Logistics Work Platform</title>
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, nocache" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot-news" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />

    <!-- Preload critical top-of-page assets for fast sequential rendering -->
    <link rel="preload" href="./img/logo_white.png" as="image" />
    <link rel="preload" href="./img/foster+partners.jpg" as="image" />
    <link rel="preload" href="./img/iota_full.jpg" as="image" />
    <link rel="preload" href="./img/iota_full_3.jpg" as="image" />

    <!-- Local font only: avoid external font requests from this private work platform. -->
    <link rel="stylesheet" as="style" href="/fonts/Pretendard/pretendard.css" />

    <script>
        if (navigator.userAgent.indexOf('Win') !== -1) {
            document.documentElement.classList.add('is-windows');
        }
        
        // FOUC (Flash of Unstyled Content) Prevention for Dark Mode
        try {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark' || !theme) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        } catch (_) {}

        // GitHub Pages SPA redirect restoration
        // Restores path from ?p= query param set by 404.html
        (function() {
            var search = location.search;
            if (search && search.indexOf('?p=') === 0) {
                var decoded = search.slice(3).replace(/~and~/g, '&');
                var qIdx = decoded.indexOf('&q=');
                var path = qIdx >= 0 ? decoded.slice(0, qIdx) : decoded;
                var query = qIdx >= 0 ? '?' + decoded.slice(qIdx + 3) : '';
                // Remove trailing slash from pathname to avoid double-slash
                var base = location.pathname.split('?')[0].replace(/\/$/, '');
                history.replaceState(null, null, base + path + query + location.hash);
            }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
